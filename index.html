
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto Download Image</title>
</head>
<body>

<script>
window.onload = function() {
    const link = document.createElement('a');
    link.href = 'https://en.wikipedia.org/wiki/Trollface#/media/File:Trollface.png'; // image URL
    link.download = 'downloaded-image.png'; // filename
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
};
</script>

<p>If the download didn’t start automatically, <a href="https://via.placeholder.com/600.png" download>click here</a>.</p>

</body>
</html>
